name: Release desktop

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build desktop on ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            targets: deb,appimage
          - platform: macos-latest
            targets: dmg
          - platform: windows-latest
            targets: msi,nsis

    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Cache pnpm dependencies
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tauriScript: pnpm tauri
          args: --target-triple ${{ matrix.platform == 'macos-latest' && 'universal-apple-darwin' || '' }} --bundles ${{ matrix.targets }}
          tagName: ${{ github.ref_name }}
          releaseName: 'RuckChat ${{ github.ref_name }}'
          releaseBody: 'See the release assets below for installer downloads.'
          includeRelease: true
          includeDebug: false
