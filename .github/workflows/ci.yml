name: CI

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres
  RUCKCHAT_TEST_ADMIN_DATABASE_URL: postgres://postgres:postgres@postgres:5432/postgres

jobs:
  quality:
    name: Format, Clippy, Docs
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Cache pnpm dependencies
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install desktop frontend dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build Web UI assets
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build
        env:
          NODE_ENV: production

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Apply migrations
        run: cargo sqlx migrate run --source migrations/migrations

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build documentation
        run: cargo doc --workspace --no-deps

  test:
    name: Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94.0

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2.9.1

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Cache pnpm dependencies
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install desktop frontend dependencies
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build Web UI assets
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm build
        env:
          NODE_ENV: production

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --locked

      - name: Apply migrations
        run: cargo sqlx migrate run --source migrations/migrations

      - name: Run tests
        run: cargo test --workspace

