# Production/runtime Docker Compose file.
#
# This file runs a pre-built ruckchat-server image. It does not build the
# server from source. For a source-build variant (useful for development or
# self-hosting from a checkout), see docker-compose.build.yml.
#
# Override the image tag with the RUCKCHAT_VERSION environment variable:
#   RUCKCHAT_VERSION=0.1.0 docker compose up -d
#
# For GitHub Container Registry images built by the release workflow, the
# default image is: ghcr.io/btafoya/ruckchat-server:latest
#
# Override the mounted runtime config with the RUCKCHAT_CONFIG environment
# variable (the scripts/server.sh helper sets this automatically):
#   RUCKCHAT_CONFIG=/etc/ruckchat/ruckchat.yaml docker compose up -d

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ruckchat
      POSTGRES_PASSWORD: ruckchat
      POSTGRES_DB: ruckchat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ruckchat -d ruckchat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ruckchat

  server:
    image: ${RUCKCHAT_IMAGE:-ghcr.io/btafoya/ruckchat-server}:${RUCKCHAT_VERSION:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    # The container target port (right side) must match the port in base_url
    # inside ruckchat.yaml. Change the left side to select the host port.
    ports:
      - "3922:3922"
    # Override the Dockerfile healthcheck so the pre-built image probes the
    # actual base_url port instead of assuming port 3000.
    healthcheck:
      test: |
        PORT=$(awk -F':' '/^base_url:/ {gsub(/[^0-9]/,"",$$NF); print $$NF}' /etc/ruckchat/ruckchat.yaml | head -n1); curl -fsS "http://localhost:$${PORT:-3000}/" >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    volumes:
      - ${RUCKCHAT_CONFIG:-./ruckchat.yaml}:/etc/ruckchat/ruckchat.yaml:ro
      - ruckchat_files:/var/lib/ruckchat/files
      - ruckchat_plugins:/var/lib/ruckchat/plugins
    networks:
      - ruckchat

volumes:
  postgres_data:
  ruckchat_files:
  ruckchat_plugins:

networks:
  ruckchat:
    driver: bridge
