openapi: 3.0.3
info:
  title: RuckChat Server API
  description: |
    REST API for RuckChat. This document contains operation stubs for the
    service-layer use cases implemented in Phase 3. Request/response schemas
    will be fully specified when HTTP handlers are implemented.
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Auth
  - name: Users
  - name: Organizations
  - name: Channels
  - name: Messages
  - name: Direct Messages
  - name: Files

paths:
  /auth/register:
    post:
      summary: Register a new user and initial organization
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: User and organization created
        '400':
          description: Validation error
        '409':
          description: Email or organization slug already exists

  /auth/login:
    post:
      summary: Authenticate and create a session
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Session token returned
        '401':
          description: Invalid credentials

  /auth/logout:
    post:
      summary: Invalidate the current session
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Session invalidated

  /users/me:
    get:
      summary: Get the authenticated user's profile
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile
    patch:
      summary: Update the authenticated user's profile
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Updated profile

  /organizations:
    get:
      summary: List organizations for the authenticated user
      tags: [Organizations]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of organizations
    post:
      summary: Create a new organization
      tags: [Organizations]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Organization created

  /organizations/{organization_id}/members:
    post:
      summary: Invite a user to the organization
      tags: [Organizations]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Member invited
    patch:
      summary: Change a member's role
      tags: [Organizations]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Role updated
    delete:
      summary: Remove a member from the organization
      tags: [Organizations]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Member removed

  /organizations/{organization_id}/channels:
    get:
      summary: List channels visible to the user
      tags: [Channels]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of channels
    post:
      summary: Create a channel
      tags: [Channels]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Channel created

  /channels/{channel_id}:
    get:
      summary: Get a channel
      tags: [Channels]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Channel details
    patch:
      summary: Update channel topic and purpose
      tags: [Channels]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Channel updated
    delete:
      summary: Archive a channel
      tags: [Channels]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Channel archived

  /channels/{channel_id}/members:
    post:
      summary: Add a member to a channel
      tags: [Channels]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Member added
    delete:
      summary: Remove a member from a channel
      tags: [Channels]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Member removed

  /channels/{channel_id}/messages:
    get:
      summary: Get message history for a channel
      tags: [Messages]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of messages
    post:
      summary: Post a message to a channel
      tags: [Messages]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Message posted

  /messages/{message_id}:
    patch:
      summary: Edit a message
      tags: [Messages]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Message updated
    delete:
      summary: Delete a message
      tags: [Messages]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Message deleted

  /messages/{message_id}/replies:
    get:
      summary: Get thread replies
      tags: [Messages]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of replies

  /direct_messages:
    get:
      summary: List DM conversations for the user
      tags: [Direct Messages]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of DM conversations
    post:
      summary: Start a DM conversation
      tags: [Direct Messages]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: DM conversation created

  /direct_messages/{conversation_id}/messages:
    get:
      summary: Get DM message history
      tags: [Direct Messages]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of messages
    post:
      summary: Post a message to a DM conversation
      tags: [Direct Messages]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Message posted

  /files:
    get:
      summary: List files in an organization
      tags: [Files]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of files
    post:
      summary: Record metadata for an uploaded file
      tags: [Files]
      security:
        - bearerAuth: []
      responses:
        '201':
          description: File recorded

  /files/{file_id}:
    get:
      summary: Get file metadata
      tags: [Files]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: File metadata

  /messages/{message_id}/attachments:
    post:
      summary: Attach a file to a message
      tags: [Files]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: File attached

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
