openapi: 3.0.3
info:
  title: RuckChat Server API
  description: |
    REST API for RuckChat. The server accepts a session token either as an
    HTTP-only `ruckchat_session` cookie or via the `Authorization: Bearer <token>`
    header.
  version: 0.1.0

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Auth
  - name: Users
  - name: Organizations
  - name: Channels
  - name: Messages
  - name: Direct Messages
  - name: Files
  - name: Reactions
  - name: Real-Time
  - name: MCP
  - name: Plugins
  - name: Web Push
  - name: Admin
  - name: Server Admin

paths:
  /auth/register:
    post:
      summary: Register a new user and initial organization
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User and organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /auth/login:
    post:
      summary: Authenticate and create a session
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Session token returned
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HTTP-only `ruckchat_session` cookie valid for 30 days
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      summary: Invalidate the current session
      tags: [Auth]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '204':
          description: Session invalidated
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me:
    get:
      summary: Get the authenticated user's profile
      tags: [Users]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      summary: Update the authenticated user's profile
      tags: [Users]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /organizations:
    get:
      summary: List organizations for the authenticated user
      tags: [Organizations]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: List of organizations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationList'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      summary: Create a new organization
      tags: [Organizations]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrganizationRequest'
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Organization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /organizations/{organization_id}/members:
    parameters:
      - name: organization_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
    get:
      summary: List members of the organization
      tags: [Organizations]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Member list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Invite a user to the organization
      tags: [Organizations]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InviteMemberRequest'
      responses:
        '201':
          description: Member invited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationMembership'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    patch:
      summary: Change a member's role in the organization
      tags: [Organizations]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeRoleRequest'
      responses:
        '200':
          description: Role updated
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Remove a member from the organization
      tags: [Organizations]
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '204':
          description: Member removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /organizations/{organization_id}/channels:
    parameters:
      - name: organization_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
    get:
      summary: List channels visible to the user
      tags: [Channels]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: List of channels
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Create a channel
      tags: [Channels]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChannelRequest'
      responses:
        '201':
          description: Channel created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /channels/{channel_id}:
    parameters:
      - name: channel_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
    get:
      summary: Get a channel
      tags: [Channels]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Channel details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      summary: Update channel topic and purpose
      tags: [Channels]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateChannelRequest'
      responses:
        '200':
          description: Channel updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Archive a channel
      tags: [Channels]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: Channel archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /channels/{channel_id}/members:
    parameters:
      - name: channel_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
    post:
      summary: Add a member to a channel
      tags: [Channels]
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '201':
          description: Member added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelMembership'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      summary: Remove a member from a channel
      tags: [Channels]
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '204':
          description: Member removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /channels/{channel_id}/messages:
    parameters:
      - name: channel_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
          minimum: 1
          maximum: 100
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
          minimum: 0
    get:
      summary: Get message history for a channel
      tags: [Messages]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Post a message to a channel
      tags: [Messages]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostChannelMessageRequest'
      responses:
        '201':
          description: Message posted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{message_id}:
    parameters:
      - name: message_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
    patch:
      summary: Edit a message
      tags: [Messages]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EditMessageRequest'
      responses:
        '200':
          description: Message updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      summary: Delete a message
      tags: [Messages]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '204':
          description: Message deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{message_id}/replies:
    parameters:
      - name: message_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
          minimum: 1
          maximum: 100
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
          minimum: 0
    get:
      summary: Get thread replies
      tags: [Messages]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: List of replies
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /direct_messages:
    get:
      summary: List DM conversations for the user
      tags: [Direct Messages]
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: organization_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: List of DM conversations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectMessageConversationList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Start a DM conversation
      tags: [Direct Messages]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartDmRequest'
      responses:
        '201':
          description: DM conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectMessageConversation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /direct_messages/{conversation_id}/messages:
    parameters:
      - name: conversation_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
          minimum: 1
          maximum: 100
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
          minimum: 0
    get:
      summary: Get DM message history
      tags: [Direct Messages]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      summary: Post a message to a DM conversation
      tags: [Direct Messages]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostDmMessageRequest'
      responses:
        '201':
          description: Message posted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /files:
    get:
      summary: List files in an organization
      tags: [Files]
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - name: organization_id
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/Uuid'
      responses:
        '200':
          description: List of files
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      summary: Upload a file via multipart form data
      tags: [Files]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [organization_id, file]
              properties:
                organization_id:
                  $ref: '#/components/schemas/Uuid'
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /files/record:
    post:
      summary: Record metadata for a file uploaded through another mechanism
      tags: [Files]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordUploadRequest'
      responses:
        '201':
          description: File recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /files/{file_id}:
    parameters:
      - name: file_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
    get:
      summary: Get file metadata
      tags: [Files]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '200':
          description: File metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{message_id}/attachments:
    parameters:
      - name: message_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
    post:
      summary: Attach a file to a message
      tags: [Files]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachFileRequest'
      responses:
        '200':
          description: File attached
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{message_id}/reactions:
    parameters:
      - name: message_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
    post:
      summary: Add a reaction to a message
      tags: [Reactions]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddReactionRequest'
      responses:
        '201':
          description: Reaction added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reaction'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /messages/{message_id}/reactions/{emoji}:
    parameters:
      - name: message_id
        in: path
        required: true
        schema:
          $ref: '#/components/schemas/Uuid'
      - name: emoji
        in: path
        required: true
        schema:
          type: string
    delete:
      summary: Remove the caller's reaction from a message
      tags: [Reactions]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '204':
          description: Reaction removed
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /websocket:
    get:
      summary: Establish an authenticated WebSocket connection
      description: |
        Upgrades the HTTP connection to a WebSocket and starts delivering
        real-time events. The connection is automatically subscribed to all
        organizations the authenticated user belongs to. Send and receive
        JSON envelopes as described in the WebSocket protocol documentation.
      tags: [Real-Time]
      security:
        - bearerAuth: []
        - cookieAuth: []
      responses:
        '101':
          description: WebSocket upgrade accepted
        '401':
          $ref: '#/components/responses/Unauthorized'

  /mcp/v1/sse:
    post:
      summary: MCP Streamable HTTP client-message endpoint
      description: |
        Accepts JSON-RPC requests for the Model Context Protocol server and
        returns responses as a Server-Sent Events stream. A successful
        `initialize` request creates a session and returns a `Mcp-Session-Id`
        header that must be included on subsequent requests. All requests must
        accept both `application/json` and `text/event-stream`.
      tags: [MCP]
      security:
        - bearerAuth: []
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: JSON-RPC 2.0 client request or notification
      responses:
        '200':
          description: JSON-RPC response delivered as SSE events
          headers:
            Mcp-Session-Id:
              schema:
                type: string
              description: Session ID for stateful requests (present on initialize)
          content:
            text/event-stream:
              schema:
                type: string
        '202':
          description: Notification accepted (empty body)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          description: Accept header missing required MIME types
        '415':
          description: Content-Type must be application/json
    get:
      summary: MCP Server-Sent Events stream
      description: |
        Opens a long-lived Server-Sent Events stream for server-initiated MCP
        messages. Requires the `Mcp-Session-Id` header identifying an existing
        session and an `Accept: text/event-stream` header.
      tags: [MCP]
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: header
          name: Mcp-Session-Id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '406':
          description: Accept header must allow text/event-stream

  /plugins/{plugin}/commands/{command}:
    post:
      summary: Invoke a plugin command
      description: |
        Dispatches a slash-style command to a loaded plugin. The plugin
        receives the conversation, the invoking user, and any arguments. The
        response may ask the server to post a message, show an ephemeral
        message, or return an error.
      tags: [Plugins]
      security:
        - bearerAuth: []
        - cookieAuth: []
      parameters:
        - in: path
          name: plugin
          required: true
          schema:
            type: string
        - in: path
