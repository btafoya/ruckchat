<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <title>RuckChat Web</title>
    <script>
      (function () {
        try {
          let theme = 'system';
          const raw = localStorage.getItem('ruckchat_settings');
          if (raw) {
            const parsed = JSON.parse(raw);
            if (parsed && typeof parsed.theme === 'string' && ['light', 'dark', 'system'].includes(parsed.theme)) {
              theme = parsed.theme;
            }
          }
          const resolved =
            theme === 'system'
              ? window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
              : theme;
          document.documentElement.classList.add(resolved);
          const meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#111827' : '#ffffff');
        } catch (e) {
          // ignore storage/read errors
        }
      })();
    </script>
  </head>
  <body class="bg-bg text-text">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
