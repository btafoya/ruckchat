# Source-build Docker Compose file.
#
# Use this file to build the ruckchat-server image from the local checkout.
# It is intended for development, CI, and self-hosters who want to build
# from source rather than pull a published image.
#
# Build and start the stack:
#   docker compose -f docker-compose.build.yml up -d
#
# Build with no cache:
#   docker compose -f docker-compose.build.yml build --no-cache
#
# Override the mounted runtime config with the RUCKCHAT_CONFIG environment
# variable (the scripts/server.sh helper sets this automatically):
#   RUCKCHAT_CONFIG=/etc/ruckchat/ruckchat.yaml docker compose -f docker-compose.build.yml up -d

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ruckchat
      POSTGRES_PASSWORD: ruckchat
      POSTGRES_DB: ruckchat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ruckchat -d ruckchat"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ruckchat

  server:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: postgres://ruckchat:ruckchat@postgres/ruckchat
    depends_on:
      postgres:
        condition: service_healthy
    # The container target port (right side) must match the port in base_url
    # inside ruckchat.yaml. Change the left side to select the host port.
    ports:
      - "3000:3000"
    # Keep the healthcheck definition in the compose file even though the
    # Dockerfile also defines one; this makes the expected port explicit.
    healthcheck:
      test: |
        PORT=$(awk -F':' '/^base_url:/ {gsub(/[^0-9]/,"",$$NF); print $$NF}' /etc/ruckchat/ruckchat.yaml | head -n1); curl -fsS "http://localhost:$${PORT:-3000}/" >/dev/null || exit 1
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    volumes:
      - ${RUCKCHAT_CONFIG:-./ruckchat.yaml}:/etc/ruckchat/ruckchat.yaml:ro
      - ruckchat_files:/var/lib/ruckchat/files
      - ruckchat_plugins:/var/lib/ruckchat/plugins
    networks:
      - ruckchat

volumes:
  postgres_data:
  ruckchat_files:
  ruckchat_plugins:

networks:
  ruckchat:
    driver: bridge
